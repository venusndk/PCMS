openapi: 3.0.3
info:
  title: PCM System API
  version: 1.0.0
  description: Personal Computer Maintenance System API
paths:
  /api/accessories/:
    get:
      operationId: list_accessories
      description: |-
        GET  /api/accessories/ - List all accessories
        POST /api/accessories/ - Register a new accessory
      summary: List all accessories
      parameters:
      - in: query
        name: location
        schema:
          type: string
        description: Filter by location
      - in: query
        name: name
        schema:
          type: string
        description: 'Filter by type: Mouse, Keyboard, Monitor, etc.'
      - in: query
        name: status
        schema:
          type: string
        description: Filter by status
      tags:
      - Accessories
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Accessory'
          description: ''
    post:
      operationId: api_accessories_create
      description: |-
        GET  /api/accessories/ - List all accessories
        POST /api/accessories/ - Register a new accessory
      summary: Register a new accessory
      tags:
      - Accessories
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessoryWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AccessoryWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AccessoryWrite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Accessory'
          description: ''
  /api/accessories/{id}/:
    get:
      operationId: retrieve_accessory
      description: GET /api/accessories/{id}/ | PUT /api/accessories/{id}/ | DELETE
        /api/accessories/{id}/
      summary: Get accessory details
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Accessories
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Accessory'
          description: ''
    put:
      operationId: api_accessories_update
      description: GET /api/accessories/{id}/ | PUT /api/accessories/{id}/ | DELETE
        /api/accessories/{id}/
      summary: Update accessory
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Accessories
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessoryWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AccessoryWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AccessoryWrite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Accessory'
          description: ''
    delete:
      operationId: api_accessories_destroy
      description: GET /api/accessories/{id}/ | PUT /api/accessories/{id}/ | DELETE
        /api/accessories/{id}/
      summary: Delete accessory
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Accessories
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/assign-technician/{id}/:
    post:
      operationId: api_assign_technician_create
      description: |-
        POST /api/assign-technician/{request_id}/
        Admin assigns a technician to a request.
      summary: Assign a technician to a request (Admin only)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Requests
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignTechnician'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssignTechnician'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssignTechnician'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignTechnician'
          description: ''
  /api/change-password/:
    post:
      operationId: api_change_password_create
      description: Change the currently logged-in user's password.
      summary: Change password
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePassword'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePassword'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePassword'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePassword'
          description: ''
  /api/dashboard/:
    get:
      operationId: api_dashboard_retrieve
      description: |-
        GET /api/dashboard/
        Returns a complete overview of all statistics.
      summary: Complete dashboard overview
      tags:
      - Dashboard
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Full dashboard stats
  /api/dashboard/devices/:
    get:
      operationId: api_dashboard_devices_retrieve
      description: Returns device counts grouped by category and status. Great for
        dashboard charts.
      summary: Device statistics
      tags:
      - Dashboard
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Device stats
  /api/dashboard/requests/:
    get:
      operationId: api_dashboard_requests_retrieve
      description: |-
        GET /api/dashboard/requests/
        Returns request statistics grouped by status and type.
      summary: Request statistics
      tags:
      - Dashboard
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Request stats
  /api/dashboard/technicians/:
    get:
      operationId: api_dashboard_technicians_retrieve
      description: Returns technician availability counts and workload data.
      summary: Technician statistics
      tags:
      - Dashboard
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Technician stats
  /api/login/:
    post:
      operationId: api_login_create
      description: 'Authenticate with email and password. Copy the ''access'' token
        and use it in Swagger''s Authorize button as: Bearer <token>'
      summary: Login
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
            examples:
              ExampleRequest:
                value:
                  email: john.doe@example.com
                  password: securepass123
                summary: Example Request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Login'
              examples:
                ExampleRequest:
                  value:
                    email: john.doe@example.com
                    password: securepass123
                  summary: Example Request
          description: ''
  /api/logout/:
    post:
      operationId: api_logout_create
      description: Logout by providing your refresh token.
      summary: Logout
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh:
                  type: string
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/me/:
    get:
      operationId: api_me_retrieve
      description: Get or update the currently logged-in user's profile.
      summary: Get my profile
      tags:
      - Authentication
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: api_me_update
      description: Get or update the currently logged-in user's profile.
      summary: Update my profile
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUser'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UpdateUser'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateUser'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/my-equipment/:
    get:
      operationId: api_my_equipment_retrieve
      description: GET /api/my-equipment/ - Get all equipment assigned to the logged-in
        technician.
      summary: Get my assigned equipment
      tags:
      - PCs
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PC'
          description: ''
  /api/network-devices/:
    get:
      operationId: list_network_devices
      description: |-
        GET  /api/network-devices/ - List all network devices
        POST /api/network-devices/ - Register a new network device
      summary: List all network devices
      parameters:
      - in: query
        name: location
        schema:
          type: string
        description: Filter by location
      - in: query
        name: name
        schema:
          type: string
        description: 'Filter by type: Router, Switch, etc.'
      - in: query
        name: status
        schema:
          type: string
        description: Filter by status
      tags:
      - Network Devices
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkDevice'
          description: ''
    post:
      operationId: api_network_devices_create
      description: |-
        GET  /api/network-devices/ - List all network devices
        POST /api/network-devices/ - Register a new network device
      summary: Register a new network device
      tags:
      - Network Devices
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NetworkDeviceWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NetworkDeviceWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NetworkDeviceWrite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkDevice'
          description: ''
  /api/network-devices/{id}/:
    get:
      operationId: retrieve_network_device
      description: GET /api/network-devices/{id}/ | PUT | DELETE
      summary: Get network device details
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Network Devices
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkDevice'
          description: ''
    put:
      operationId: api_network_devices_update
      description: GET /api/network-devices/{id}/ | PUT | DELETE
      summary: Update network device
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Network Devices
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NetworkDeviceWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NetworkDeviceWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NetworkDeviceWrite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkDevice'
          description: ''
    delete:
      operationId: api_network_devices_destroy
      description: GET /api/network-devices/{id}/ | PUT | DELETE
      summary: Delete network device
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Network Devices
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/pcs/:
    get:
      operationId: list_pcs
      description: Returns all PCs. Filter by location or status using query params.
      summary: List all PCs
      parameters:
      - in: query
        name: location
        schema:
          type: string
        description: 'Filter by location: Lab or Office'
      - in: query
        name: status
        schema:
          type: string
        description: 'Filter by status: Working, Not Working, Damaged, Old'
      - in: query
        name: technician
        schema:
          type: integer
        description: Filter by assigned technician ID
      tags:
      - PCs
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PC'
          description: ''
    post:
      operationId: api_pcs_create
      description: |-
        GET  /api/pcs/  - List all PCs (with optional filters)
        POST /api/pcs/  - Register a new PC (Technicians and Admins)
      summary: Register a new PC
      tags:
      - PCs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PCWrite'
            examples:
              Example:
                value:
                  brand: Dell
                  ram: 8GB
                  hdd: 500GB HDD
                  operating_system: Windows 10
                  registration_year: 2022
                  location: Lab
                  status: Working
                  technician_assigned: 2
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PCWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PCWrite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PC'
              examples:
                Example:
                  value:
                    brand: Dell
                    ram: 8GB
                    hdd: 500GB HDD
                    operating_system: Windows 10
                    registration_year: 2022
                    location: Lab
                    status: Working
                    technician_assigned: 2
          description: ''
  /api/pcs/{id}/:
    get:
      operationId: retrieve_pc
      description: |-
        GET    /api/pcs/{id}/ - Get a single PC
        PUT    /api/pcs/{id}/ - Update a PC
        DELETE /api/pcs/{id}/ - Delete a PC (Admin only)
      summary: Get PC details
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - PCs
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PC'
          description: ''
    put:
      operationId: api_pcs_update
      description: |-
        GET    /api/pcs/{id}/ - Get a single PC
        PUT    /api/pcs/{id}/ - Update a PC
        DELETE /api/pcs/{id}/ - Delete a PC (Admin only)
      summary: Update PC
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - PCs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PCWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PCWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PCWrite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PC'
          description: ''
    delete:
      operationId: api_pcs_destroy
      description: |-
        GET    /api/pcs/{id}/ - Get a single PC
        PUT    /api/pcs/{id}/ - Update a PC
        DELETE /api/pcs/{id}/ - Delete a PC (Admin only)
      summary: Delete PC
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - PCs
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/register/:
    post:
      operationId: api_register_create
      description: Create a new Administrator or Technician account.
      summary: Register a new user
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
            examples:
              ExampleRequest:
                value:
                  first_name: John
                  last_name: Doe
                  email: john.doe@example.com
                  password: securepass123
                  confirm_password: securepass123
                  role: Technician
                  phone: '+1234567890'
                  status: Available
                summary: Example Request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
              examples:
                ExampleRequest:
                  value:
                    first_name: John
                    last_name: Doe
                    email: john.doe@example.com
                    password: securepass123
                    confirm_password: securepass123
                    role: Technician
                    phone: '+1234567890'
                    status: Available
                  summary: Example Request
          description: ''
  /api/reports/:
    get:
      operationId: list_reports
      description: |-
        GET  /api/reports/ - List all reports
        POST /api/reports/ - Create a maintenance report (Technicians)
      summary: List all maintenance reports
      parameters:
      - in: query
        name: device_type
        schema:
          type: string
        description: 'Filter by: PC, Accessory, NetworkDevice'
      - in: query
        name: technician
        schema:
          type: integer
        description: Filter by technician ID
      tags:
      - Reports
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
          description: ''
    post:
      operationId: api_reports_create
      description: |-
        GET  /api/reports/ - List all reports
        POST /api/reports/ - Create a maintenance report (Technicians)
      summary: Create a maintenance report
      tags:
      - Reports
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReportCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReportCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
          description: ''
  /api/reports/{id}/:
    get:
      operationId: retrieve_report
      description: GET /api/reports/{id}/ | DELETE /api/reports/{id}/
      summary: Get report details
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Reports
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
          description: ''
    delete:
      operationId: api_reports_destroy
      description: GET /api/reports/{id}/ | DELETE /api/reports/{id}/
      summary: Delete report (Admin only)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Reports
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/requests/:
    get:
      operationId: list_requests
      description: 'Admin: see all requests. Technicians: see only their assigned
        requests.'
      summary: List all requests
      parameters:
      - in: query
        name: request_type
        schema:
          type: string
        description: Filter by request type
      - in: query
        name: status
        schema:
          type: string
        description: 'Filter: Pending, Technician Assigned, Fixed, Not Fixed'
      tags:
      - Requests
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Request'
          description: ''
    post:
      operationId: api_requests_create
      description: Anyone (employees) can submit a request without logging in.
      summary: Submit a new ICT support request
      tags:
      - Requests
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RequestCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RequestCreate'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Request'
          description: ''
  /api/requests/{id}/:
    get:
      operationId: retrieve_request
      description: GET /api/requests/{id}/ - View a specific request
      summary: Get request details
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Requests
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Request'
          description: ''
    delete:
      operationId: api_requests_destroy
      description: GET /api/requests/{id}/ - View a specific request
      summary: Delete a request (Admin only)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Requests
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/requests/{id}/update-status/:
    post:
      operationId: api_requests_update_status_create
      description: Technicians can mark their assigned requests as Fixed or Not Fixed.
      summary: Update request status (Fixed / Not Fixed)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Requests
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRequestStatus'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UpdateRequestStatus'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateRequestStatus'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateRequestStatus'
          description: ''
  /api/technicians/:
    get:
      operationId: api_technicians_list
      description: '[Admin Only] List all technicians.'
      summary: List all technicians
      tags:
      - Technician Management (Admin Only)
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
          description: ''
  /api/technicians/{id}/:
    get:
      operationId: api_technicians_retrieve
      description: '[Admin Only] Get, update, or delete a specific technician.'
      summary: Get technician details
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Technician Management (Admin Only)
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: api_technicians_update
      description: '[Admin Only] Get, update, or delete a specific technician.'
      summary: Update technician
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Technician Management (Admin Only)
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUser'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UpdateUser'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateUser'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    delete:
      operationId: api_technicians_destroy
      description: '[Admin Only] Get, update, or delete a specific technician.'
      summary: Delete technician
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Technician Management (Admin Only)
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/token/refresh/:
    post:
      operationId: api_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
components:
  schemas:
    Accessory:
      type: object
      description: Serializer for reading Accessory data.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          $ref: '#/components/schemas/AccessoryTypeEnum'
        brand:
          type: string
          maxLength: 100
        location:
          type: string
          maxLength: 100
        status:
          $ref: '#/components/schemas/EquipmentStatusEnum'
        technician_assigned:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - brand
      - created_at
      - id
      - location
      - name
      - technician_assigned
    AccessoryTypeEnum:
      enum:
      - Mouse
      - Keyboard
      - Monitor
      - Projector
      - Printer
      - Scanner
      - UPS
      - Other
      type: string
      description: |-
        * `Mouse` - Mouse
        * `Keyboard` - Keyboard
        * `Monitor` - Monitor
        * `Projector` - Projector
        * `Printer` - Printer
        * `Scanner` - Scanner
        * `UPS` - UPS
        * `Other` - Other
    AccessoryWrite:
      type: object
      description: Serializer for creating/updating an Accessory.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          $ref: '#/components/schemas/AccessoryTypeEnum'
        brand:
          type: string
          maxLength: 100
        location:
          type: string
          maxLength: 100
        status:
          $ref: '#/components/schemas/EquipmentStatusEnum'
        technician_assigned:
          type: integer
          nullable: true
      required:
      - brand
      - id
      - location
      - name
    AssignTechnician:
      type: object
      description: For assigning a technician to a request (Admin only).
      properties:
        technician_id:
          type: integer
          description: The ID of the technician to assign
      required:
      - technician_id
    ChangePassword:
      type: object
      description: Used when a user wants to change their password.
      properties:
        old_password:
          type: string
          writeOnly: true
        new_password:
          type: string
          writeOnly: true
          minLength: 6
      required:
      - new_password
      - old_password
    EquipmentStatusEnum:
      enum:
      - Working
      - Not Working
      - Damaged
      - Old
      type: string
      description: |-
        * `Working` - Working
        * `Not Working` - Not Working
        * `Damaged` - Damaged
        * `Old` - Old
    LocationEnum:
      enum:
      - Lab
      - Office
      type: string
      description: |-
        * `Lab` - Lab
        * `Office` - Office
    Login:
      type: object
      description: |-
        Used when a user logs in with email and password.
        Returns the authenticated user object.
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    NetworkDevice:
      type: object
      description: Serializer for reading NetworkDevice data.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          $ref: '#/components/schemas/NetworkDeviceTypeEnum'
        brand:
          type: string
          maxLength: 100
        ip_address:
          type: string
          nullable: true
          description: e.g., 192.168.1.1
        location:
          type: string
          maxLength: 100
        status:
          $ref: '#/components/schemas/EquipmentStatusEnum'
        technician_assigned:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - brand
      - created_at
      - id
      - location
      - name
      - technician_assigned
    NetworkDeviceTypeEnum:
      enum:
      - Access Point
      - Switch
      - Router
      - Modem
      - Firewall
      - Other
      type: string
      description: |-
        * `Access Point` - Access Point
        * `Switch` - Switch
        * `Router` - Router
        * `Modem` - Modem
        * `Firewall` - Firewall
        * `Other` - Other
    NetworkDeviceWrite:
      type: object
      description: Serializer for creating/updating a NetworkDevice.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          $ref: '#/components/schemas/NetworkDeviceTypeEnum'
        brand:
          type: string
          maxLength: 100
        ip_address:
          type: string
          nullable: true
          description: e.g., 192.168.1.1
        location:
          type: string
          maxLength: 100
        status:
          $ref: '#/components/schemas/EquipmentStatusEnum'
        technician_assigned:
          type: integer
          nullable: true
      required:
      - brand
      - id
      - location
      - name
    PC:
      type: object
      description: |-
        Serializer for reading PC data.
        Shows technician details as a nested object.
      properties:
        id:
          type: integer
          readOnly: true
        brand:
          type: string
          description: e.g., Dell, HP, Lenovo
          maxLength: 100
        ram:
          type: string
          description: e.g., 8GB, 16GB
          maxLength: 50
        hdd:
          type: string
          description: e.g., 500GB HDD, 256GB SSD
          maxLength: 50
        operating_system:
          type: string
          description: e.g., Windows 10, Ubuntu 22
          maxLength: 100
        registration_year:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Year this PC was registered
        location:
          $ref: '#/components/schemas/LocationEnum'
        status:
          $ref: '#/components/schemas/EquipmentStatusEnum'
        technician_assigned:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - brand
      - created_at
      - hdd
      - id
      - operating_system
      - ram
      - registration_year
      - technician_assigned
    PCWrite:
      type: object
      description: |-
        Serializer for creating/updating a PC.
        Accepts technician_assigned as an ID (integer).
      properties:
        id:
          type: integer
          readOnly: true
        brand:
          type: string
          description: e.g., Dell, HP, Lenovo
          maxLength: 100
        ram:
          type: string
          description: e.g., 8GB, 16GB
          maxLength: 50
        hdd:
          type: string
          description: e.g., 500GB HDD, 256GB SSD
          maxLength: 50
        operating_system:
          type: string
          description: e.g., Windows 10, Ubuntu 22
          maxLength: 100
        registration_year:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Year this PC was registered
        location:
          $ref: '#/components/schemas/LocationEnum'
        status:
          $ref: '#/components/schemas/EquipmentStatusEnum'
        technician_assigned:
          type: integer
          nullable: true
      required:
      - brand
      - hdd
      - id
      - operating_system
      - ram
      - registration_year
    Register:
      type: object
      description: |-
        Used when creating a new user.
        - 'password' is write_only: it will never be sent back in responses
        - 'confirm_password' is just for validation, not saved to DB
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          writeOnly: true
          minLength: 6
        confirm_password:
          type: string
          writeOnly: true
        role:
          $ref: '#/components/schemas/UserRoleEnum'
        phone:
          type: string
          nullable: true
          maxLength: 20
        status:
          $ref: '#/components/schemas/UserStatusEnum'
      required:
      - confirm_password
      - email
      - first_name
      - id
      - last_name
      - password
    Report:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        device_type:
          $ref: '#/components/schemas/ReportDeviceTypeEnum'
        device_id:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: The ID of the PC, Accessory, or Network Device
        status:
          $ref: '#/components/schemas/ReportStatusEnum'
        technician:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        location:
          type: string
          maxLength: 100
        report_date:
          type: string
          format: date
          readOnly: true
        description:
          type: string
          description: Describe what was done or what the problem is
      required:
      - description
      - device_id
      - device_type
      - id
      - location
      - report_date
      - status
      - technician
    ReportCreate:
      type: object
      properties:
        device_type:
          $ref: '#/components/schemas/ReportDeviceTypeEnum'
        device_id:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: The ID of the PC, Accessory, or Network Device
        status:
          $ref: '#/components/schemas/ReportStatusEnum'
        location:
          type: string
          maxLength: 100
        description:
          type: string
          description: Describe what was done or what the problem is
      required:
      - description
      - device_id
      - device_type
      - location
      - status
    ReportDeviceTypeEnum:
      enum:
      - PC
      - Accessory
      - NetworkDevice
      type: string
      description: |-
        * `PC` - PC
        * `Accessory` - Accessory
        * `NetworkDevice` - Network Device
    ReportStatusEnum:
      enum:
      - Working
      - Not Working
      - Damaged
      - Old
      - Repaired
      - Replaced
      type: string
      description: |-
        * `Working` - Working
        * `Not Working` - Not Working
        * `Damaged` - Damaged
        * `Old` - Old
        * `Repaired` - Repaired
        * `Replaced` - Replaced
    Request:
      type: object
      description: For reading request data - shows technician details.
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 254
        telephone:
          type: string
          maxLength: 20
        unit:
          type: string
          description: Department or Unit name
          maxLength: 100
        request_type:
          $ref: '#/components/schemas/RequestTypeEnum'
        description:
          type: string
          description: Describe the issue in detail
        date:
          type: string
          format: date
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/RequestStatusEnum'
          readOnly: true
        assigned_technician:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
      required:
      - assigned_technician
      - date
      - description
      - email
      - first_name
      - id
      - last_name
      - request_type
      - status
      - telephone
      - unit
    RequestCreate:
      type: object
      description: For creating a new request (submitted by anyone - no login needed).
      properties:
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 254
        telephone:
          type: string
          maxLength: 20
        unit:
          type: string
          description: Department or Unit name
          maxLength: 100
        request_type:
          $ref: '#/components/schemas/RequestTypeEnum'
        description:
          type: string
          description: Describe the issue in detail
      required:
      - description
      - email
      - first_name
      - last_name
      - request_type
      - telephone
      - unit
    RequestStatusEnum:
      enum:
      - Pending
      - Technician Assigned
      - Fixed
      - Not Fixed
      type: string
      description: |-
        * `Pending` - Pending
        * `Technician Assigned` - Technician Assigned
        * `Fixed` - Fixed
        * `Not Fixed` - Not Fixed
    RequestTypeEnum:
      enum:
      - Internet cable installation
      - OS repair
      - Antivirus installation
      - Hardware repair
      - Software installation
      - Network troubleshooting
      - Data recovery
      - Other ICT services
      type: string
      description: |-
        * `Internet cable installation` - Internet cable installation
        * `OS repair` - OS repair
        * `Antivirus installation` - Antivirus installation
        * `Hardware repair` - Hardware repair
        * `Software installation` - Software installation
        * `Network troubleshooting` - Network troubleshooting
        * `Data recovery` - Data recovery
        * `Other ICT services` - Other ICT services
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    UpdateRequestStatus:
      type: object
      description: For updating request status (Technician).
      properties:
        status:
          $ref: '#/components/schemas/UpdateRequestStatusStatusEnum'
      required:
      - status
    UpdateRequestStatusStatusEnum:
      enum:
      - Fixed
      - Not Fixed
      type: string
      description: |-
        * `Fixed` - Fixed
        * `Not Fixed` - Not Fixed
    UpdateUser:
      type: object
      description: |-
        Used when updating a user's profile.
        Email and role cannot be changed through this serializer.
      properties:
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        phone:
          type: string
          nullable: true
          maxLength: 20
        status:
          $ref: '#/components/schemas/UserStatusEnum'
      required:
      - first_name
      - last_name
    User:
      type: object
      description: |-
        Used to display user information in API responses.
        Password is excluded for security.
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        full_name:
          type: string
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 254
        role:
          $ref: '#/components/schemas/UserRoleEnum'
        phone:
          type: string
          nullable: true
          maxLength: 20
        status:
          $ref: '#/components/schemas/UserStatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - email
      - first_name
      - full_name
      - id
      - last_name
    UserRoleEnum:
      enum:
      - Administrator
      - Technician
      type: string
      description: |-
        * `Administrator` - Administrator
        * `Technician` - Technician
    UserStatusEnum:
      enum:
      - Available
      - Busy
      - Not Available
      type: string
      description: |-
        * `Available` - Available
        * `Busy` - Busy
        * `Not Available` - Not Available
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
